<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Portal Slideshow</title>
<style>
  :root {
    --transition-seconds: 1.2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    cursor: none;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
  }
  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity calc(var(--transition-seconds) * 1s) ease-in-out;
    animation: kenburns 14s ease-in-out forwards;
  }
  .slide.active { opacity: 1; z-index: 2; }
  .slide.prev { opacity: 0; z-index: 1; }

  @keyframes kenburns {
    0%   { transform: scale(1.0); }
    100% { transform: scale(1.08); }
  }

  #overlay {
    position: absolute;
    left: 32px; bottom: 28px;
    z-index: 10;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    font-weight: 300;
  }
  #clock { font-size: 3.2rem; line-height: 1; font-variant-numeric: tabular-nums; }
  #date { font-size: 1.1rem; margin-top: 4px; opacity: 0.85; text-transform: capitalize; }

  #status {
    position: absolute;
    top: 16px; right: 20px;
    z-index: 10;
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    transition: opacity 0.3s ease;
  }
  #status.fade {
    opacity: 0;
    pointer-events: none;
  }

  #errorBox {
    position: absolute;
    inset: 0;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    background: #111;
    color: #eee;
    padding: 40px;
    text-align: center;
    font-size: 1.1rem;
  }
</style>
</head>
<body>

<div id="stage"></div>

<div id="overlay">
  <div id="clock">--:--</div>
  <div id="date">-</div>
</div>

<div id="status"></div>

<div id="errorBox">
  Nenhuma foto carregou.<br>Confira a conexão com Google Drive.
</div>

<script>
/* =========================================================
   GOOGLE DRIVE INTEGRATION
   ========================================================= */
const DRIVE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxfgFf79eicjRkG7mWoPdDcSaKyexx1pvTw9vkAywHV0CxA2IBB68oPytRH9b3k1jZZ/exec";
  
// Segundos que cada foto fica na tela
const SECONDS_PER_PHOTO = 8;

// Embaralhar ordem a cada carregamento? (true/false)
const SHUFFLE = true;

/* ========================================================= */

const stage = document.getElementById('stage');
const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date');
const statusEl = document.getElementById('status');
const errorBox = document.getElementById('errorBox');

let PHOTOS = [];
let order = [];
let idx = 0;
let currentEl = null;
let showNextTimeout = null;
let failedPhotos = new Set();

function preload(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(url);
    img.onerror = () => reject(url);
    img.src = url;
  });
}

function setStatus(message, duration = 3000) {
  statusEl.textContent = message;
  statusEl.classList.remove('fade');
  
  if (duration > 0) {
    setTimeout(() => {
      statusEl.classList.add('fade');
    }, duration);
  }
}

async function loadPhotosFromGoogleDrive() {
  try {
    setStatus("Carregando fotos do Drive...", 0);
    
    // Use JSONP to bypass CORS
    return new Promise((resolve, reject) => {
      window.photosCallback = function(data) {
        PHOTOS = data;
        
        if (!Array.isArray(PHOTOS) || PHOTOS.length === 0) {
          throw new Error("Nenhuma foto encontrada");
        }
        
        setStatus(`✓ Carregadas ${PHOTOS.length} fotos`, 2000);
        initializeSlideshow();
        resolve();
      };
      
      const script = document.createElement('script');
      script.src = DRIVE_SCRIPT_URL + "?callback=photosCallback";
      script.onerror = () => {
        setStatus("✗ Erro ao carregar fotos", 0);
        errorBox.style.display = 'flex';
        console.error("Drive error: Failed to load script");
        reject(new Error("Failed to load script"));
      };
      document.head.appendChild(script);
    });
  } catch (err) {
    setStatus("✗ Erro ao carregar fotos", 0);
    errorBox.style.display = 'flex';
    console.error("Drive error:", err);
  }
}

function initializeSlideshow() {
  order = [...PHOTOS.keys()];
  if (SHUFFLE) {
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }
  }
  showNext();
}

async function showNext() {
  if (PHOTOS.length === 0) {
    errorBox.style.display = 'flex';
    return;
  }

  // Se todas as fotos falharam, mostrar erro
  if (failedPhotos.size === PHOTOS.length) {
    setStatus("✗ Todas as imagens falharam", 0);
    errorBox.style.display = 'flex';
    return;
  }

  const url = PHOTOS[order[idx % order.length]];
  idx++;

  try {
    await preload(url);
    failedPhotos.delete(url);
  } catch (e) {
    failedPhotos.add(url);
    setStatus(`Falha ao carregar (${failedPhotos.size}/${PHOTOS.length}), pulando...`);
    showNextTimeout = setTimeout(showNext, 300);
    return;
  }

  const el = document.createElement('div');
  el.className = 'slide active';
  el.style.backgroundImage = `url("${url}")`;
  stage.appendChild(el);

  if (currentEl) {
    const old = currentEl;
    old.classList.remove('active');
    old.classList.add('prev');
    setTimeout(() => old.remove(), 1500);
  }
  currentEl = el;

  showNextTimeout = setTimeout(showNext, SECONDS_PER_PHOTO * 1000);
}

// Relógio - atualiza a cada segundo
function tickClock() {
  const now = new Date();
  clockEl.textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  dateEl.textContent = now.toLocaleDateString('pt-BR', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
}
tickClock();
setInterval(tickClock, 1000);

// Evita a tela apagar/dormir enquanto a página estiver aberta
let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      setStatus("Wake Lock ativado", 2000);
      wakeLock.addEventListener('release', () => {
        setStatus("Wake Lock liberado", 2000);
      });
    } else {
      setStatus("Wake Lock não suportado", 3000);
    }
  } catch (err) {
    setStatus("Wake Lock falhou", 3000);
  }
}
requestWakeLock();

// Reativa o wake lock se a aba voltar a ficar visível
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    requestWakeLock();
  }
});

// Limpar timeout ao descarregar página
window.addEventListener('beforeunload', () => {
  clearTimeout(showNextTimeout);
});

// Início - carregar fotos do Google Drive
loadPhotosFromGoogleDrive();
</script>
</body>
</html>
