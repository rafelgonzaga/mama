<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Portal Slideshow</title>
<style>
  :root {
    --transition-seconds: 1.2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    cursor: none;
  }
  #stage {
    position: relative;
    width: 100vw; height: 100vh;
  }
  .slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-size: cover;
    background-position: center;
    opacity: 0;
    transition: opacity calc(var(--transition-seconds) * 1s) ease-in-out;
    animation: kenburns 14s ease-in-out forwards;
  }
  .slide.active { opacity: 1; z-index: 2; }
  .slide.prev { opacity: 0; z-index: 1; }

  @keyframes kenburns {
    0%   { transform: scale(1.0); }
    100% { transform: scale(1.08); }
  }

  #overlay {
    position: absolute;
    left: 32px; bottom: 28px;
    z-index: 10;
    color: rgba(255,255,255,0.92);
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    font-weight: 300;
  }
  #clock { font-size: 3.2rem; line-height: 1; font-variant-numeric: tabular-nums; }
  #date { font-size: 1.1rem; margin-top: 4px; opacity: 0.85; text-transform: capitalize; }

  #status {
    position: absolute;
    top: 16px; right: 20px;
    z-index: 10;
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
    transition: opacity 0.3s ease;
  }
  #status.fade {
    opacity: 0;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="stage"></div>

<div id="overlay">
  <div id="clock">--:--</div>
  <div id="date">-</div>
</div>

<div id="status"></div>

<script>
const PHOTOS = [
  "https://drive.google.com/uc?export=view&id=1zB90liQpd7VnsjgWPTblrsHYxeuzdxzd",
  "https://drive.google.com/uc?export=view&id=1rf8QCaktzqQni--HtMkomyrI8U1ZN1oa",
  "https://drive.google.com/uc?export=view&id=10OSr5-NAphuYO9pSWWSZswfIG3lUvLbW",
  "https://drive.google.com/uc?export=view&id=1mXE8l1zYVsKpCc0_iuYsU6CHTh05KtdZ"
];

const SECONDS_PER_PHOTO = 8;
const SHUFFLE = true;

const stage = document.getElementById('stage');
const clockEl = document.getElementById('clock');
const dateEl = document.getElementById('date');
const statusEl = document.getElementById('status');

let order = [];
let idx = 0;
let currentEl = null;
let showNextTimeout = null;

function setStatus(message, duration = 3000) {
  statusEl.textContent = message;
  statusEl.classList.remove('fade');
  
  if (duration > 0) {
    setTimeout(() => {
      statusEl.classList.add('fade');
    }, duration);
  }
}

function showNext() {
  const url = PHOTOS[order[idx % order.length]];
  idx++;

  const el = document.createElement('div');
  el.className = 'slide active';
  el.style.backgroundImage = `url("${url}")`;
  stage.appendChild(el);

  if (currentEl) {
    const old = currentEl;
    old.classList.remove('active');
    old.classList.add('prev');
    setTimeout(() => old.remove(), 1500);
  }
  currentEl = el;

  showNextTimeout = setTimeout(showNext, SECONDS_PER_PHOTO * 1000);
}

function tickClock() {
  const now = new Date();
  clockEl.textContent = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  dateEl.textContent = now.toLocaleDateString('pt-BR', {
    weekday: 'long', day: 'numeric', month: 'long'
  });
}
tickClock();
setInterval(tickClock, 1000);

let wakeLock = null;
async function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      setStatus("Wake Lock ativado", 2000);
    }
  } catch (err) {
    setStatus("Wake Lock falhou", 3000);
  }
}
requestWakeLock();

document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    requestWakeLock();
  }
});

window.addEventListener('beforeunload', () => {
  clearTimeout(showNextTimeout);
});

// Initialize
setStatus(`✓ Carregadas ${PHOTOS.length} fotos`, 2000);
order = [...PHOTOS.keys()];
if (SHUFFLE) {
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
}
showNext();
</script>
</body>
</html>
